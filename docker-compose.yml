services:
  # ── Demo API ──────────────────────────────────────────────────────────────
  demo-api:
    build: ./demo-api
    container_name: demo-api
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - monitoring
    labels:
      - "logging=promtail"

  # ── Trigger Web ───────────────────────────────────────────────────────────
  trigger-web:
    image: nginx:alpine
    container_name: trigger-web
    ports:
      - "80:80"
    volumes:
      - ./trigger-web:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - monitoring

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - monitoring

  # ── Loki ──────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - monitoring

  # ── Grafana Alloy ─────────────────────────────────────────────────────────
  alloy:
    image: grafana/alloy:v1.1.1
    container_name: alloy
    ports:
      - "12345:12345"
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - loki
      - prometheus

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/demo-api.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
